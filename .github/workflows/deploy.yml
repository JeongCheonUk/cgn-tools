name: Deploy cgn-tools

on:
  push:
    branches: [master]

jobs:
  deploy-backend:
    name: Deploy Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Workers secrets
        run: |
          echo "${{ secrets.AWS_ACCESS_KEY_ID }}" | npx wrangler secret put AWS_ACCESS_KEY_ID
          echo "${{ secrets.AWS_SECRET_ACCESS_KEY }}" | npx wrangler secret put AWS_SECRET_ACCESS_KEY
          echo "${{ secrets.S3_BUCKET_NAME }}" | npx wrangler secret put S3_BUCKET_NAME
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: deploy-backend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Inject programs.ts
        env:
          PROGRAMS_TS: ${{ secrets.PROGRAMS_TS }}
        run: |
          mkdir -p src/config
          printf '%s' "$PROGRAMS_TS" > src/config/programs.ts

      - name: Build
        run: npm run build
        env:
          VITE_CLOUDFRONT_THUMB_DOMAIN: ${{ secrets.VITE_CLOUDFRONT_THUMB_DOMAIN }}
          VITE_CLOUDFRONT_VIDEO_DOMAIN: ${{ secrets.VITE_CLOUDFRONT_VIDEO_DOMAIN }}
          VITE_WORKERS_URL: ${{ secrets.VITE_WORKERS_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: cgn-tools
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'
